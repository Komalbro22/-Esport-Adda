name: Flutter APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [esport_user_app, esport_admin_app]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get Dependencies (Core)
        run: flutter pub get
        working-directory: esport_core

      - name: Get Dependencies (App)
        run: flutter pub get
        working-directory: ${{ matrix.app }}

      - name: Build APK (Release)
        run: flutter build apk --release
        working-directory: ${{ matrix.app }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-release-apk
          path: ${{ matrix.app }}/build/app/outputs/flutter-apk/app-release.apk
