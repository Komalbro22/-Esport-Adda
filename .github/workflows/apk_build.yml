name: Flutter APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [esport_user_app, esport_admin_app]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get Dependencies (Core)
        run: flutter pub get
        working-directory: esport_core

      - name: Get Dependencies (App)
        run: flutter pub get
        working-directory: ${{ matrix.app }}

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > android/app/esportadda-release.keystore
        working-directory: ${{ matrix.app }}

      - name: Create key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          echo "storePassword=$KEYSTORE_PASSWORD" > android/key.properties
          echo "keyPassword=$KEY_PASSWORD" >> android/key.properties
          echo "keyAlias=$KEY_ALIAS" >> android/key.properties
          echo "storeFile=esportadda-release.keystore" >> android/key.properties
        working-directory: ${{ matrix.app }}

      - name: Build APK (Release)
        run: flutter build apk --release --build-number=${{ github.run_number }}
        working-directory: ${{ matrix.app }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-release-apk
          path: ${{ matrix.app }}/build/app/outputs/flutter-apk/app-release.apk
