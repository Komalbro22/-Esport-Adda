name: Build Android APKs

run-name: "APK Build • ${{ github.ref_name }} • #${{ github.run_number }}"

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build ${{ matrix.app.name }} APK
    runs-on: ubuntu-latest
    env:
      BUILD_NUMBER: ${{ github.run_number }}
    strategy:
      fail-fast: false
      matrix:
        app:
          - name: User App
            dir: esport_user_app
            artifact: esport_user_app-apk
          - name: Admin App
            dir: esport_admin_app
            artifact: esport_admin_app-apk

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get Dependencies (Core)
        run: flutter pub get
        working-directory: esport_core

      - name: Get Dependencies (${{ matrix.app.name }})
        run: flutter pub get
        working-directory: ${{ matrix.app.dir }}

      - name: Build APK (${{ matrix.app.name }})
        working-directory: ${{ matrix.app.dir }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ] || [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_PASSWORD" ] || [ -z "$KEY_ALIAS" ]; then
            echo "ERROR: Signing secrets are missing. Release APK is required for install/update compatibility."
            exit 1
          fi

          echo "Using signed release build (build number: $BUILD_NUMBER)"
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/esportadda-release.keystore
          printf "storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=%s\n" \
            "$KEYSTORE_PASSWORD" \
            "$KEY_PASSWORD" \
            "$KEY_ALIAS" \
            "esportadda-release.keystore" > android/key.properties

          flutter build apk --release --build-number="$BUILD_NUMBER"
          cp build/app/outputs/flutter-apk/app-release.apk ../${{ matrix.app.artifact }}.apk

      - name: Upload Artifact (${{ matrix.app.name }})
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app.artifact }}-b${{ env.BUILD_NUMBER }}
          path: ${{ matrix.app.artifact }}.apk
