name: esport_user_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.0.0

dependencies:
  esport_core:
    path: ../esport_core
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.2
  flutter_local_notifications: ^18.0.1
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  go_router: ^17.1.0
  http: ^1.6.0
  image_picker: ^1.2.1
  intl: ^0.20.2
  provider: ^6.1.5+1
  supabase_flutter: ^2.12.0
  flutter_native_splash: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png

flutter_native_splash:
  color: "#0F1117"
  image: assets/logo.png
  android: true
  ios: true
  web: false

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  adaptive_icon_background: "#0F1117"
  adaptive_icon_foreground: "assets/logo.png"
